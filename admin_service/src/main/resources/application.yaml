spring:
  application:
    name: admin-service

  datasource:
    url: jdbc:h2:mem:admin-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  profiles:
    active: dev

server:
  port: 8081

logging:
  level:
    root: INFO
    com.hse.adminservice: DEBUG
    org.hibernate.SQL: DEBUG